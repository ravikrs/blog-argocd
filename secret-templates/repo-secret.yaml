apiVersion: v1
kind: Secret
metadata:
  name: github-repo-pat
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/<YOUR_GH_USERNAME>/<YOUR_GH_REPO>
  username: <YOUR_GH_USERNAME>
  # Paste a fresh PAT here before applying. Generate at:
  # GitHub → Settings → Developer settings → Personal access tokens
  # Fine-grained PAT: Contents permission → Read-only
  # Classic PAT: repo scope (read-only is sufficient)
  password: <YOUR_GITHUB_PAT>
